name: "💡 Task"
description: "새로운 작업을 등록합니다."
title: "[] "
labels: []

body:
  - type: textarea
    id: why
    attributes:
      label: "🤷🏻 왜 이 작업을 해야 하나요? (Why)"
      description: "이 작업이 필요한 이유를 작성해주세요."
      placeholder: |
        예)
        - 해결하려는 문제는 무엇인가요?
        - 해결하지 않으면 어떤 문제가 발생하나요?
        - 지금 이 시점에 필요한 이유는 무엇인가요?
    validations:
      required: true

  - type: textarea
    id: what
    attributes:
      label: "👨🏻‍💻 무엇을 변경할 예정인가요? (What)"
      description: "구현할 내용 또는 변경 사항을 작성해주세요."
      placeholder: |
        예)
        - 구현할 기능 또는 변경 사항
        - 영향 범위
        - 완료 목표
    validations:
      required: true
